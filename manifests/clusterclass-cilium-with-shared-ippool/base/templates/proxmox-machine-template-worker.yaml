kind: ProxmoxMachineTemplate
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
metadata:
  name: proxmox-clusterclass-v0.1.0-workertemplate
spec:
  template:
    spec:
      templateSelector:
        matchTags:
          - "v1.34.1"
      format: qcow2
      full: true
      network:
        networkDevices:
          - name: net0 
            bridge: vmbr0
            model: virtio
            ipPoolRef:
            - kind: InClusterIPPool
              apiGroup: ipam.cluster.x-k8s.io
              name: clusterclass-ipv4